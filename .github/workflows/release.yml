name: Release

on:
  release:
    types:
      - published

jobs:
  release:
    name: Publish to crates.io
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository at release tag
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.tag_name }}

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry
        uses: Swatinem/rust-cache@v2

      - name: Validate release tag matches Cargo.toml version
        shell: bash
        run: |
          manifest_version=$(sed -n 's/^version = "\(.*\)"/\1/p' Cargo.toml | head -n 1)
          tag_name="${{ github.event.release.tag_name }}"

          if [ "$tag_name" = "$manifest_version" ] || [ "$tag_name" = "v$manifest_version" ]; then
            echo "Release tag matches Cargo.toml version: $manifest_version"
            exit 0
          fi

          echo "Release tag ($tag_name) does not match Cargo.toml version ($manifest_version)"
          exit 1

      - name: Run tests
        run: cargo test --all-features --workspace

      - name: Publish to crates.io
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: cargo publish
